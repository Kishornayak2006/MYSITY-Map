name: mysity_map
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.4
  http: ^1.2.0
  shared_preferences: ^2.2.2
  flutter_tts: ^3.8.5
  firebase_core: ^2.27.0
  cloud_firestore: ^4.15.0
  # 🎞️ Added for the opening animation
  lottie: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # 📱 Added for generating App Icons
  flutter_launcher_icons: ^0.14.4
  # 🌊 Added for the Native Splash Screen (prevents white flash)
  flutter_native_splash: ^2.4.7

# --- CONFIGURATION FOR TOOLS ---

# 1. App Icon Configuration
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21 
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo.png"

# 2. Native Splash Configuration
flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/logo.png"
  android_12:
    image: "assets/logo.png"
    color: "#FFFFFF"
  fullscreen: true

flutter:
  uses-material-design: true

  # 📂 Make sure to register your asset folders here!
  assets:
    - assets/
    - assets/animations/